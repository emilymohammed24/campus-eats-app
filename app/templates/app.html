{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/app.js')}}"></script>
{% endblock %}

{% block additional_styles %}
<style>
    .welcome-banner {
        background: linear-gradient(135deg, #d8f3dc, #b7e4c7);
        border-radius: 24px;
        padding: 32px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
    }
    
    .welcome-banner::before {
        position: absolute;
        bottom: -10px;
        right: -10px;
        font-size: 80px;
        opacity: 0.2;
    }
    
    .section-title {
        color: #1b4332;
        font-weight: 700;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .section-title .material-symbols-outlined {
        font-size: 28px;
        color: #52b788;
    }
    
    .user-table {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }
    
    .user-table thead {
        background: linear-gradient(135deg, #2d6a4f, #52b788);
        color: white;
    }
    
    .user-table th {
        padding: 16px;
        font-weight: 600;
        border: none;
    }
    
    .user-table td {
        padding: 12px 16px;
        vertical-align: middle;
    }
    
    .user-table tbody tr:hover {
        background: #d8f3dc;
    }
    
    .empty-state {
        text-align: center;
        padding: 48px;
        background: white;
        border-radius: 24px;
    }
    
    .empty-state .material-symbols-outlined {
        font-size: 64px;
        color: #b7e4c7;
    }
</style>
{% endblock %}

{% block subpage_content %}

    <div class="container" id="content">
        <div class="row">
            <p>
                This is table is rendered on the Client. JavaScript code requests the data from <a href="/api/users">/api/users</a> and writes it to this page.
            </p>
        </div>
        <div class="row">
            <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Id</th><th>Username</th>
                  </tr>
                </thead>
                <tbody id="result">
                
                <tbody>
            </table>
        </div>
    </div>

{% endblock %}
